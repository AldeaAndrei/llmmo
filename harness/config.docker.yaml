api:
  # Reaches the backend over the internal Docker network.
  base_url: http://backend:8080/api/v1
  api_key_env: LLMMO_AGENT_KEY

planner:
  type: ollama
  mock_plan_path: plans/mock_default.json
  ollama:
    # Standalone Ollama container, reachable by name on the shared Docker network.
    base_url: http://ollama:11434/v1
    model: llama3.2:3b
    temperature: 0.1
    request_timeout_seconds: 300
    log_prompts: true

schedule:
  plan_interval_seconds: 900
  execute_interval_seconds: 30
  max_commands_per_execute: 1

database:
  path: /data/harness.db
