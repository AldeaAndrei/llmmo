api:
  base_url: http://localhost:5000/api/v1
  api_key_env: LLMMO_AGENT_KEY
  # api_key: llmmo_...   # optional; prefer api_key_env

planner:
  type: mock
  mock_plan_path: plans/mock_default.json
  ollama:
    base_url: http://localhost:11434/v1
    model: llama3.1
    temperature: 0.3
    request_timeout_seconds: 300
    log_prompts: false   # set true to print system/user prompt and model response

schedule:
  plan_interval_seconds: 900
  execute_interval_seconds: 30
  max_commands_per_execute: 1

database:
  path: data/harness.db
