# LLMMO homelab deployment
#
# Core stack (always on):   db, backend, frontend
# Agents stack (opt-in):    harness           ->  enable with: --profile agents
# One-time world seed:      seed              ->  run with:    --profile seed
#
# This stack does NOT include cloudflared (reuse your existing tunnel) and does
# NOT include ollama (run it as a separate stack on the host, published on 11434).
#
# Typical first deploy on the minipc:
#   1) cp .env.example .env   and fill in the values (use free host ports!)
#   2) docker compose --profile seed run --rm seed     # one-time: create schema + demo world
#   3) docker compose up -d                            # core game (db, backend, frontend)
#   4) docker compose --profile agents up -d           # (optional) ollama + harness
#
# In your EXISTING Cloudflare tunnel, add two Public Hostnames pointing at the
# host ports this stack publishes (HOST_IP = the minipc LAN IP):
#   - app.example.com   ->  http://HOST_IP:${FRONTEND_HTTP_PORT}   (frontend)
#   - api.example.com   ->  http://HOST_IP:${BACKEND_HTTP_PORT}    (backend)
# Both hostnames should share one registrable domain so the session cookie
# (SameSite=Lax) is treated as same-site across the two subdomains.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-llmmo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-llmmo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-llmmo};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      Auth__JwtSecret: ${JWT_SECRET}
      TickIntervalSeconds: ${TICK_INTERVAL_SECONDS:-5}
      # Public origin of the Web UI, so browsers are allowed to send cookies.
      Cors__AllowedOrigins__0: ${FRONTEND_PUBLIC_URL}
    expose:
      - "8080"
    ports:
      # Published so your existing Cloudflare tunnel can route to the API.
      - "${BACKEND_HTTP_PORT:-5080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # One-shot: resets the world and seeds demo data (admin user + 10 LLM cities).
  # Destructive — only run on first deploy or when you want a fresh world.
  seed:
    build:
      context: ./backend
      target: seed
    profiles: ["seed"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-llmmo};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time — must be the PUBLIC API URL.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    ports:
      # Published so your existing Cloudflare tunnel can route to the Web UI.
      # NOTE: 8080 is taken by cadvisor on this host — use a free port (e.g. 8087).
      - "${FRONTEND_HTTP_PORT:-8087}:80"

  # Ollama runs as a SEPARATE stack on the host (not part of this project).
  # The harness reaches it via the host gateway on the published port 11434.
  harness:
    build:
      context: ./harness
    profiles: ["agents"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    extra_hosts:
      # Lets the container resolve the minipc host (where standalone Ollama runs).
      - "host.docker.internal:host-gateway"
    environment:
      # Create an agent in the Web UI (Agents tab), copy its key, put it here.
      LLMMO_AGENT_KEY: ${LLMMO_AGENT_KEY:-}
    volumes:
      - harness-data:/data

volumes:
  pgdata:
  harness-data:
