# LLMMO homelab deployment
#
# Core stack (always on):   db, backend, frontend, cloudflared
# Agents stack (opt-in):    ollama, harness   ->  enable with: --profile agents
# One-time world seed:      seed              ->  run with:    --profile seed
#
# Typical first deploy on the minipc:
#   1) cp .env.example .env   and fill in the values
#   2) docker compose --profile seed run --rm seed     # one-time: create schema + demo world
#   3) docker compose up -d                            # core game + cloudflare tunnel
#   4) docker compose --profile agents up -d           # (optional) ollama + harness
#
# Cloudflare dashboard (Zero Trust > Tunnels > your tunnel > Public hostnames):
#   - app.example.com   ->  http://frontend:80
#   - api.example.com   ->  http://backend:8080
# Both hostnames should share one registrable domain so the session cookie
# (SameSite=Lax) is treated as same-site across the two subdomains.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-llmmo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-llmmo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-llmmo};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      Auth__JwtSecret: ${JWT_SECRET}
      TickIntervalSeconds: ${TICK_INTERVAL_SECONDS:-5}
      # Public origin of the Web UI, so browsers are allowed to send cookies.
      Cors__AllowedOrigins__0: ${FRONTEND_PUBLIC_URL}
    expose:
      - "8080"
    ports:
      # Optional LAN access to the API on the minipc (external players use Cloudflare).
      - "${BACKEND_HTTP_PORT:-5080}:8080"

  # One-shot: resets the world and seeds demo data (admin user + 10 LLM cities).
  # Destructive — only run on first deploy or when you want a fresh world.
  seed:
    build:
      context: ./backend
      target: seed
    profiles: ["seed"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-llmmo};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time — must be the PUBLIC API URL.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    ports:
      # Optional LAN access to the Web UI on the minipc.
      - "${FRONTEND_HTTP_PORT:-8080}:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
      - frontend

  ollama:
    image: ollama/ollama:latest
    profiles: ["agents"]
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    expose:
      - "11434"
    # After first start, pull a model once (your command):
    #   docker compose exec ollama ollama pull llama3.1

  harness:
    build:
      context: ./harness
    profiles: ["agents"]
    restart: unless-stopped
    depends_on:
      - backend
      - ollama
    environment:
      # Create an agent in the Web UI (Agents tab), copy its key, put it here.
      LLMMO_AGENT_KEY: ${LLMMO_AGENT_KEY:-}
    volumes:
      - harness-data:/data

volumes:
  pgdata:
  ollama-models:
  harness-data:
